# Paper-scale config on CAC 40 (French blue-chips).
# Mirrors configs/paper.yaml exactly; only the `data` block is swapped to CAC 40.
# CAC 40 has fewer constituents and shorter Yahoo history than S&P 500, so
# min_years is softened from 40 to 25. Everything else matches the paper.

data:
  universe: cac40
  tickers: null               # null => fetch_cac40_tickers() from Wikipedia
  min_years: 25               # CAC 40 history is shorter than S&P 500
  seq_len: 2048               # paper: 2048
  stride: 400                 # paper: 400

sde:
  type: gbm
  cev_gamma: 1.0
  schedule: cosine
  sigma_min: 0.01
  sigma_max: 1.0
  T: 1.0
  N_reverse: 2000

model:
  channels: 128
  diffusion_emb_dim: 256
  feature_emb_dim: 64
  n_heads: 8
  n_layers: 4
  dropout: 0.0

train:
  batch_size: 64
  epochs: 1000
  lr: 1.0e-4
  weight_decay: 0.0
  grad_clip: 1.0
  num_workers: 4
  device: cuda
  ckpt_dir: experiments/checkpoints
  log_every: 50

eval:
  n_samples: 120
  tail_fraction: 0.05
  max_lag_vc: 1000
  max_lag_lev: 100
